body:
  text: 此事難知巻二假令脾肺虚則補其母謂肺病而補其脾也則腎自平矣假令脾肺實則㵼其子謂脾病而㵼其肺也則心自平矣難經云從前來者為實邪從後來者為虚邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪假令心病中風得之為虚邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪假令心病得脾脈土在火之分也尅火之水退而不敢至火獨王於南方是從前來者為實邪也假令心病得肝脈木在火之分也土退而不敢至土退而不至則尅火之水隨木而至是從後來者為虚邪也假令脾肺虚脾母能令肺子虚也用理中湯非補脾也脾中補肺也故曰虚則補其母以其脾為生肺之本也則用人參白术之類大經曰滋苗者必固其根此之謂也假令脾肺實肺子能令脾母實也用㵼黄散非㵼脾也脾中㵼肺也故曰實則㵼其子以其脾為生肺之上源則用梔子石膏之類大經曰伐下者必枯其上此之謂也天和六脈六甲王脈四時平脈合而用之則天地人三才之道備矣諸經皆言大則病進者何也答曰散而浮大者心也心主無為相火用事是為相應以五服言之王畿中也以王畿言之九重中也君主無為當靜以養血若浮大而出於外非其所宜也以王道言之書云外作禽荒未或不亡經云主不明則十二官危矣此散而浮大者君主兼臣下之權而不知反故曰大則病進南政甲巳所臨之歲司天在泉但見君火在上者上不應在下者下不應北政但見君火在上則下不應在下則上不應在左則右不應在右則左不應當沈而浮當浮而沈也南政以前為左以後為右君也北政以前為右以後為左臣也啓𤣥子云天地隂陽視之可見何必思諸㝠昧演法推求智極心勞而無所得耶難經仲景合而為一仲景先太陽以陽明後少陽自無形傳有形從外而之内者也仲景之所言言天令而暴至者也難經先少陽次陽明後太陽自有形傳無形從内而之外者也故難經之言言雜病而久疾者也仲景叔和合而為一仲景言弦濇為隂叔和言弦濇為陽何意大抵弦濇東西也以南北分之故有隂陽之别濇本燥火弦本水少雖有南北之分縂而言之則不離諸數為熱諸遲為寒仲景叔和言本兩途非相違背合而論之皆是也仲景所言言傷寒自外而入者叔和所言言五藏自内而出者傷寒從氣而入故仲景以弦脈為隂自艮而之内從外入先太陽也位在東北雜病從血而出故叔和以弦脈為陽自巽而之外從内出先少陽也位在東南凡在右者皆受左尅凡在左者皆尅諸右浮尅浮沈尅沈表裏所當汗下手太隂復主表證却當汗右行隂二十五度肺大腸脾胃命門心包三焦八裏主下左行陽二十五度心小腸肝膽腎膀胱七表主下足厥隂復主血證却當下仲景浮汗而沈下右手沈實調胃承氣左手沈實桃仁抵當難經沈汗而浮下右手浮實枳實牽牛左手浮實桃仁四順右手雜病是為之表傷寒是為之裏左手雜病是為之裏傷寒是為之表傷寒入裏見標脈則死假令胃病下之脈浮而汗出是也雜病出表見標脈則死假令脾病補之脈弦而面青是也察色脈以定吉凶脈地也色天也地生天則順天生地則逆假令得弦脈而面赤色地生天也地生天則順也兒扶母兮瘥速也假令得弦脈而面黒色天生地也天生地則逆也母抑子兮退遲也色者隂中之陽氣也本乎天脈者陽中之隂氣也本乎地弦有浮沈浮為甲化素言天化泄土沈為乙不化難言地不化泄木泄土者梔子黄糵泄木者防風羌活洪浮者為丙便有水化從其變也洪浮者為丁只是火化從其常也鍼經甲丙戊庚壬皆變乙丙己辛癸不變并只言木雜病元無表證者不可言左手有下證只當言右手手足陽明中求之傷寒元有表證者可言左手有下證下證者血證也當於足厥隂中求之相合脈經脈之相合各有虚實不可作一體觀之假令洪弦相合洪客也弦主也子能令母實也弦洪相合弦客也洪主也母能令子虚也餘藏可以類推之至於手足之經亦相合假令傷寒脈浮𦂳而帶洪者即手經丙也餘倣此假令侮所不勝者挾其勢也脈弦而入金之分非挾火之勢則不敢侵金之分弦而帶數甲終於甲也弦而帶洪壬終於丙也脈當有神脈之不病其神不言當自有也脈既病當求其中神之有與無焉謂如六數七極熱也脈中有力即有神也三遲二敗寒也脈中有力即有神也熱則有神當泄其熱則神在焉寒熱之脈無力無神將何藥而泄熱去寒乎茍不知此而遽泄去之將何依以生所以十亡八九故經曰脈者血氣之先又云血氣者人之神可以不謹養乎不可不察其有無乎治病必當求責假令治病無問傷寒畜血結胸發黄等病諸證并一切雜證各當於六經中求責之謂如發黄證或頭痛腰脊强惡寒即太陽證也或身熱目疼鼻乾不得卧即有陽明證也餘皆倣此更有手足經或一經非本家病而自他經流入者亦當求責謂如手陽明流入足陽明是上流下也本非足經病當於手經中求之是知治足經者非也亦有下而流上者其餘諸經相貫通者皆然更有支别流入者亦有同鄰而病者合為表裏者鄰也亦有夫婦各相傳受者甲傳已之類脾傳胃之類亦是皆當求責之凡言虚實皆當於子母中求責之治病必求其本假令腹痛桂枝加芍藥大黄桂枝加大黄何為不只用芍藥大黄之屬却於桂枝湯内加之大抵治病必求其本如知從太陽中來故以太陽為本也又如結胸證自高而下脈浮者不可下故先用麻黄湯解表已脈沈然後以陷胸湯下之是亦求其本也至於畜血下焦血結膀胱是亦從太陽中來侵盡無形之氣乃侵膀胱中有形血也形不足者温之以氣精不足者補之以味謂寒傷形熱傷氣形氣能自傷也此云不足者皆太過也以其太過則自傷自傷則不足矣金匱真言云冬按蹻四時各有病者何葢五藏之陽氣皆伏於腎中動有深淺隨行動而病故於四時而各異也痛隨利減諸痛為實痛隨利減世皆以利為下之者非也假令痛在表者實也痛在血氣者亦實也在表者汗之則痛愈在裏者下之則痛愈在血氣者散之行之則痛愈豈可以利之只作下之乎但將利字解作通字或訓作導字則可矣是以諸痛為實痛隨利減汗而通導之利也下而通導之亦利也散氣行血皆通導而利之也故經曰諸痛為實痛隨利減又曰通則不痛痛則不通此之謂也抑本假令高者抑之非高者固當抑也以其本下而失之太高故抑之而使下若本高何抑之有假令下者舉之非下者固當舉也以其本高而失之太下故舉之而使高若本下何舉之有虚實假令水在木之分是從後來從後來者為虚邪雖在水為虚邪則木本虚矣經曰母能令子虚假令火在木之分是從前來從前來者為實邪則木本實矣經曰子能令母實假令兩手脈中弦無表證乃東方實也是西方肺氣大不足也縁母虚所致也當大補其脾微補其肺大泄其火微泄其木雜證諸論云先調其氣次論諸疾况此乃本經不足之證也難經云東方實是西方虚也又云欲泄其邪先補其虚此之謂也如是之證當以温藥補脾以氣藥燥劑為用如正氣已勝當以泄火泄風之藥清高涼上勿令入胃中此為全治益黄白术半夏茯苓甘草酒病得之加澤㵼手足陽明二燥用益黄者燥濕而補其氣也實泄黄也泄火木泄青之類羌活防風生地黄黄連等分黄芩倍之凡用藥補即用各方之生數理中九建中湯是也㵼即用各方之成數七宣元七聖丸是也問兩手寸闗弦疾脾弱火勝木旺土虧金爍當作何治答曰不從標本從乎中治也木標也土本也火中也爍金虧土旺木者皆火也仲陽安神丸主之山芋門冬益金之氣金氣勝則木自平凝水石牙硝火中添水使變為濕熱也濕熱者季夏之令也非土而何故用硃砂以墜火下行是已將退與子權行濕令也是以弦得除而土自旺也秋喘加人參與丹砂等夏則不加養氣者加沈香欲發汗者臨卧先服白粥一盃後藥之則汗也寒熱神少振摇小便淋或多或少大便走完榖不化口乾舌縮唇吻有瘡心下痞大渴引飲惡乾喜濕目花四肢無力怠惰嗜卧食不入皮膚燥澁面色黧黒肌肉銷鑠胸腹中急額上汗出此法泄火益濕補氣脈弦浮沈同治氣不化小便不利濕潤肌滑熱蒸隂少氣不化氣走小便自利燥肌燥澁為迫津液不能停離硃丹主之弦數者陽陷於内從外而之内也弦則帶數甲終於甲也𦂳則帶洪壬終於壬丙也若弦虚則無火細則無水此二脈從内之外也不宜離硃丹木併火之勢尅脾侮金當金㵼火侮所不勝弦金金補土是也右寸昰弦數脈是東方木既乗火勢而來侮金當實乃乗子勢也既㵼其金中㵼火火退則木無所恃火木自虚矣以寒藥㵼而自退也是實則㵼其子火是補北方水也水六月大熱之氣反得大寒之病氣難布息身涼脈遲二三至何以治之答曰病有標本病為本令為標用寒則順時而失本用熱則從本而逆時故不從標本而從乎中治中治者用温也然則温不能救大寒之病非薑附則不可若用薑附似非温治之不然衰其大半乃止反四至餘病便天令治之足矣雖用薑附是亦中治也非温而何經曰用熱逺熱雖用之不當然勝主可化亦其理也證湯液之圖瘧之為病以暑舎於榮衛之間得秋之風寒所傷而後發亦有非暑感冐風寒而得之者邪并於陽則發熱冰水不能涼邪并於隂則發寒湯火不能温并則病作離則病止作止故有時在氣則發早在血則發晏淺則日作深則間日或在頭項或在背中或在腰脊雖上下逺近之不同在太陽一也或在四肢者風淫之所及隨所傷而作不必盡當風府也先寒而後熱者謂之寒瘧先熱而後寒者謂之温瘧二者不當治水火當從乎中治中治者少陽也渴者燥勝也不渴者濕勝也瘧雖傷暑遇秋而發其不應也秋病寒甚太陽多也冬寒不甚陽不爭也春病則惡風夏病則多汗汗者皆少陽虚也其病隨四時而作異形如此又得之於冬而發之於暑邪舍於腎足少隂也有藏之於心内熱素於肺手太隂也至於少氣煩寃手足熱而嘔但熱而不寒謂之癉瘧足陽明也治之奈何方其盛矣勿敢必毁因其寒也事必大昌治法易老瘧論備矣治當順時夏天氣上行秋天氣下行治者當順天道謂如先寒後熱太陽陽明病白虎加桂也此天氣上行宜用之若天氣下行則不宜㵼肺宜㵼相火命門則可矣亦有内傷冷物而作者當先調中後定瘧形治隨應見乃得康寜亦有久而不差者當求虚實以脈為期虚補實㵼可使却疾此之謂也問素問難經銅人經絡所病各異者如用鍼當從何法答曰素問者從天之六氣言也難經者從地之血脈言也銅人者從經言人也從天而言先氣而後血從地而言亦先氣而後血從人而言在天地之間從地之病而言即地中之氣病故血從而病也從天而言先是動後所生從地而言亦先是動而所生之病後也問寒病服熱藥而寒不退熱病服寒藥而熱不退其故何也啓𤣥子云熱不得寒是無水也寒不得熱是無火也寒之不寒責其無水熱之不熱責其無火經曰滋其化源既已絶藥之假不能滋其真水火也疾有自悞或始不早治日數久淹或困乃求醫法不及用病勢已盈豈為天命病有變怪張仲景平脈法第及診得脈形證相應因與服湯食頃變大吐下腹痛是為變怪或有舊時服藥今乃作法是亦謂之灾怪耳喘論此論當以經言邪氣盛則實㫁之華佗云盛而為喘減而為枯故活人亦云發喘者氣有餘也凡㸔文字須要㑹得本意盛而為喘者非肺氣盛也喘為肺氣有餘者亦非氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛又為有餘則當清肅下行而不喘以其火入於肺衰與不足而為喘焉故言盛者非言肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中之火有餘也故㵼肺以苦寒之劑非㵼肺也㵼肺中之火寔補肺氣也用者不可不知桔梗枳殻湯活人書言治痞當知是痞宜先用桔梗枳殻湯非用此以治心下痞也審知錯下必成痞證是氣將陷而過於胸中故先用此使不至於痞也若已成痞而用之則失之晩矣不惟不能消痞胸中之氣反病矣先之一字預早之意也先用枳殻湯若不應後以仲景痞藥治之則可若執枳殻湯以治痞其害亦深矣痞之一字不可不知也尋衣撮空何藏所主尋衣撮空許學士説作肝熱風淫末疾故手為之尋衣撮空此論雖然莫若㫁之為肺熱似為愈矣其人必譫語妄言經曰肺入火為讝言兼上焦有疾肺必主之手經者上焦也二者皆當其理果何如哉天地互為體用此肺之體肝之用肝主諸血血者隂物也此静體何以自動葢肺主諸氣為氣所鼓舞故靜得動一者説肝之用一者説肺之體此天地互為體用二者俱為當矣是知肝藏血自寅至申行陽二十五度諸陽用事氣為肝所使肺主氣自申至寅行隂二十五度諸隂用事血為肺所用三法五治論若五治不分邪僻内作工不能禁夫治病之道有三法焉初中末也初治之道法當猛峻者謂所用藥勢疾利猛峻也縁病得之新暴感之輕得之重皆當以疾利猛峻之藥急去之中治之道法當寛猛相濟為病得之非新非久當以緩疾得中之養正去邪相兼濟而治之養正去邪者假令如見邪氣多正氣少宜以去邪藥多正氣藥少凡加減藥法如此之類更以臨時對證消息増減用藥仍依時令行之無忌也更加鍼灸其效甚速末治之道法當寛緩寛者謂藥平善廣服無毒惟能養血氣安中葢為病證已久邪氣潛伏至深而正氣微少故以善藥廣服養正多而邪氣自去更加以鍼灸其效必速矣夫療病之道有五治法焉和取從折法也一治各有五五五二十五治如火之屬衰於戊金之屬衰於辰是也一治曰和假令小熱之病當以凉藥和之和之不已次用取二治曰取為熱勢稍大當以寒藥取之取之不已次用從三治曰從為勢既甚當以温藥從之為藥氣温也味隨所為或以寒因勢用味通所用或寒以温用或以發汗之不已又再折四治曰折為病勢極甚當以逆制之逆制之不已當以下奪之下奪之不已又用屬五治曰屬為求其屬以衰之縁熱深陷在骨髓間無法可出鍼藥所不能及故求其屬以衰之求屬之法是同聲相應同氣相求經曰陷下者灸之夫衰熱之法同前所云火衰於戌金衰於辰之類是也如或又不已當廣其法而治之譬如孫子之用兵若在山谷則塞淵泉在水陸則把渡口在平川廣野當青野千里塞淵泉者刺俞穴把渡口者奪病發時前青野千里者如肌羸痩弱宜廣服大藥以養正大病有中外治有緩急在内者以内治法和之氣微不和以調氣法調之在外者以外治法和之其次大者以平氣法平之盛甚不已則奪其氣令其衰也故經曰調氣之方必别隂陽定其中外各守其鄉内者内治外者外治微者調治其次平治盛者奪之汗者下之寒熱温凉衰之以屬隨其攸利面部形色之圖察色分位坤胃遺敗至腎死兌肺乾大腸遺散至肝死額􅀢坎腎頥精明五色巽膽遺散至脾死震肝艮小腸遺散至肺死天元圖七十四難曰從其首繫其數間象在表五化疊元以應望聞肝青大敦木井臊曲泉水合酸中封金經呼太衝土俞泣行間水滎心赤少府火滎焦少衝木井苦少海水合言靈道金經汗神門土俞脾黄太白土俞香大都火滎甘隱白木井歌隂靈泉水合涎商丘金經肺白經渠金經腥大淵土俞辛魚際火滎哭少商木井涕天澤水合腎黑隂谷水合腐復溜金經醎太谿土俞呻然谷火滎液湧泉木井地元圖六十八難曰元證脈合復生五象井心下滿膽元証身熱體重節痛喘𠻳寒熱逆氣洩滎身熱心下滿小腸元證體重寒熱逆氣俞體重節痛心下滿胃身熱元證寒熱逆氣經喘欬寒熱心下滿大腸身熱體重元證逆氣合逆氣而洩心下滿膀胱身熱體重寒熱元證假令膽病善潔面青善怒元證得弦脈脈合又病心下滿當刺膽井如見善潔面青善怒脈又弦又病身熱當刺膽滎又病體重節痛當刺膽俞如見善潔面青善怒脈又弦又病喘咳寒熱當刺膽合餘經例倣此假令肝經淋溲便難轉筋春刺井夏刺滎秋刺經冬刺合人元例六十五難説合七十二難説滎在經木火土金水再分七象以應切脈獨包七法有隂陽配合父子兄妹接經平經説家拔原隂陽例隂陽者子午也謂滎合水火之稱名曰隂陽也十二經皆有之或感得父氣或感得母氣而病焉子午者乾坤也乾坤包六子六子附乾坤也故七十難云春夏各致一隂秋冬各致一陽春夏刺井滎秋冬刺經合是各致一隂一陽之義亦謂井經近乎子午然當微㵼其滎微補其經大補其合或補㵼反作是寒則留之熱則疾之故微大補㵼以應春食凉夏食寒秋食温冬食熱假令膽病善潔面青善怒脈得浮之實大沈之損小是感得父氣為陽中之陽當於本經中㵼火補水却得浮之損小沈之實大是感得母氣為隂中之陽當於本經中㵼水補火配合例七十七難曰上工治未病者見肝之病則知肝當傳於脾故先實其脾氣無令受肝之邪氣也假令見肝病欲實其脾者先於足太隂經中補土字一鍼又補火字一鍼後於足厥隂經内㵼木字又㵼火字一鍼子母例假令見肝病滿悶淋溲便難轉筋又見心病煩心心痛掌中熱而噦當於足厥隂肝經内木火二字各一鍼兄妹例已上子母兄妹名曰四針象假令見足厥隂肝之經太過又兼見膽之證太過是為兄妹當㵼肝經内木火二字各一針又㵼膽經内木火二字各一鍼此五法乃人元法也接經手足經同内經曰留痩不移節而刺之使十二經無過絶假令十二經中是何經畧不通行當刺不通行凝滯經俱令接過節如刺之無問其數以平為期如諸經俱虚補十二經如諸經俱實㵼十二經補當隨而濟之㵼當迎而奪之平經説象七十九難為見諸經中無過與不及之病而有病八十難曰有見如入謂左手見氣來至乃内鍼針入見氣盡乃出鍼非用迎隨補㵼之法不虚不實不虚謂真氣未虚不實謂邪氣未實以此故自取其經施其法也拔源例假令鍼本經病了又於本經原穴亦鍼一針如補肝經亦於肝原穴上補一鍼如㵼肝經來亦於肝經原穴上㵼一鍼如餘經有補㵼鍼畢倣此例亦補㵼各經原穴接經補遺又補其母亦名隨而濟之又㵼其子亦名迎而奪之又隨呼吸出内亦名迎隨也兩脇痛少陽丘墟心痛少隂太谿并湧泉足厥隂原穴腰痛崑崙委中出血喘滿痰實如膠太谿嘔噦無度手厥隂大陵頭痛手足太陽發熱無度不可止陷谷出血小腸疝氣痛是厥隂太衝百節痠疼實無所知三稜刺絶骨出血婦人血不止刺足太隂井喉閉手足少陽井并少商王足大隂井大煩熱不止晝夜無力刺十指間出血謂八闗大節眼發痛欲出亦須大刺目痛大眥痛刺太陽井頭中痛不可忍卒疝痛婦人隂中痛皆刺足厥隂井目痛小眥痛刺少陽井心痛脈沈腎原穴脈弦肝原穴濇脈肺原穴緩脈脾原穴身之前足陽明原穴身之後足太陽原穴身之側足太陽原穴灸一身之内分為八方臍以下至尾以年為壯准以下至腰中以年為壯手足四分自井為一滎為二至合為五之類自膽中分四向如井滎數倍之百㑹為一分亦如膽中法凡欲灸者先診其脈若浮者不可灸灸之必變月晦前後各二日屬坤為癸乙月缺無㵼月望前後各二日屬乾為甲壬月滿無補初三日至上弦屬震仰盂為庚上弦日至月望屬兌上缺為丁月望日至下弦屬巽為風為辛下弦日至月晦屬艮納雨為丙天元圖七十四難曰從其首繫其數間象在表五化疊元並見前圖夫天元法者謂之五化疊元當從其首繫其數首者寅方春也在人為肝是從東方順天輪數至所主之處計從幾數却於所受病一方倒疊回去數至依前數盡處便於元受病一方穴内㵼所止之方來路穴也不得於所主之方内經中㵼之勿悞假令病者聞香臭二者心主五臭也入脾為香臭從東數至所主之處所主五臭者心也東一南二計得二數却當於受病之方倒疊囘去脾一心二元數三也是數至心心者滎火也當於受病之方内㵼滎火是脾經㵼火都是也或曰何以倒疊數對曰此從地出為天輪所載右遷於天不當於所顯之處治之此舟行岸移之意也地元圖六十八難曰元證脈合復生五象在表間象以應望聞及肝膽各五法並見前圖人元法例前圖已載七象七法見前人元例後並見前圖大接經從陽引隂足太陽膀胱經之脈出於至隂小指外側去爪甲角如韭葉為金井足小指之端也十呼足少隂腎之脈湧泉足心也起於小指之下斜趣三呼手厥隂心包脈其直者循中指出其端去爪甲如韮葉陷中為井中衝穴也其支者别掌中循小指次指出其端手少陽三焦之脈起於小指次指之端去爪甲角如韭葉為井三呼足少隂膽之脈去於竅隂小指次指之間去爪甲如韭葉為井其支者上入大指岐骨内出其端還貫爪甲出三毛三呼二十呼足厥隂之脈起於大指之端入聚毛之際去爪甲如韭葉為井大敦穴也及三毛中七呼六呼手太隂脈之脈起於大指之端出於少商大指内側也去爪甲如韮葉為井其支者出次指内膁出其端手陽明大腸之脈起於大指次指之端入次指之内側去爪甲角如韭葉為井二呼中指内交三呼足陽明胃之脈起於大指次指之端去爪甲如韮葉為井其支者大指間出其端一呼足太隂脾之脈起於足大指端循指内側去爪甲角如韭葉為井隱白也十呼手少隂心之脈起於小指内出其端循指内膁之端去爪甲角如韮葉為井三呼手太陽小腸之脈起於小指之端循指之端去爪甲一分䧟中為井五呼大接經從隂引陽手太隂肺之脈起於大指端出於少商大指内側也去爪甲角如韭葉為井其支者出次指内膁出其端手陽明大腸之脈起於大指次指之端入次指内側去爪甲如韭葉為井一呼足陽明胃之脈起於大指次指之端去爪甲如韭葉為井一呼其支者大指出其端足太隂脾之脈起於足大指端循指内側去爪甲角如韭葉為井隱白也手少隂心之脈起於小指内出其端循指内膁之端去爪甲角如韭葉為井手太陽小腸之脈起於小指之端去爪甲下一分陷中為井足太陽膀胱之脈出於至隂小指外側去爪甲角如韭葉為井金足小指之端也足少隂腎之脈起於小指之下為井湧泉穴也手厥隂心包之脈其直者循中指出其端去爪甲角如韭葉陷中為井中衝穴也其支者别掌中循小指次指出其端手少隂三焦之脈起於小指次指之端去爪甲角如韭葉為井足少陽膽之脈出於竅隂足小指次指之端如韭葉為井其支者上入大指岐骨内出其端還貫爪甲出三毛足厥隂肝之脈起於大指之端入聚毛之際去爪甲如韭葉為井大敦及三毛中六呼凡此大接經從隂引陽從陽引隂東垣二十五論後録諸經頭痛陽明頭痛自汗發熱白芷少陽頭痛脈弦往來寒熱柴胡太陽頭痛惡風惡寒川芎太隂頭痛痰實體重腹痛半夏少隂頭痛手三隂三陽經不流行而足寒逆為寒厥頭痛細辛厥隂頭痛項痛脈微浮緩欲入太陽其疾痊矣然而亦當用川芎氣虚頭痛黄茋血虚頭痛當歸諸氣血俱虚頭痛黄茋當歸傷寒頭痛無汗麻黄湯有汗桂枝湯太陽經所發陽明頭痛白虎湯少陽頭痛柴胡湯太隂頭痛脈浮桂枝湯脈沈理中湯少隂頭痛脈沈微熱麻黄附子細辛湯厥隂頭痛外傷本經桂枝麻黄各半湯嘔而微吐水吳茱茰湯内亦病此易老曰非白术不能去濕非枳實不能消痞非天雄不能補上焦之陽虚非附子不能補下焦之陽虚治目不能逺視能近視或亦妨近視或脈風成癘地芝元主之生地黄爆乾四兩天門冬湯泡去心枳殻麫炒去穰二兩甘菊花未開者秤二兩右為細末煉蜜丸如梧桐子大如能飲食茶清湯下不能飲食温酒下食後改熟地黄亦可此説亦見病機氣直目門下亦有治目不能近視責其有火不能近視責其無水法當補腎目能近視責其有水不能逺視責其無火法當補心補腎補足少隂補心補手少隂補腎六味地黄丸加牡蠣補心定志丸加茯苓治精滑久不愈固真丸單牡蠣不以多少砂鍋子内煆醋淬七遍為末醋糊為丸如梧桐子大每服五十丸空心塩湯下六脈俱弦指下又虚脾胃虚弱病也食少而渴不已心卞痞腹中痛或腹中狹窄如䋲來之急小便不利大便不調精神短少此藥專治大渴不止腹中狹窄所食減以大有神效白茯苓去皮陳皮去白人參生薑先用滚湯掠過焙乾各秤一兩秋時減薑一半如脈弦或腹中急甚加甘草三錢右同為末煉蜜為丸如弹子大每服一丸白湯化下食前空心細嚼白湯送下亦可忌生冷硬物及怒發思慮過節六脈沈𦂳按之不鼓膀胱勝小腸也或㵼利不止而腹脹或純便血赤血或雜膿血便雖多而不渴精神短少或面白脱色此失血之故或面黄而氣短此元氣損少之故且小腸者手太陽經丙火也膀胱者足太陽經壬水也是壬水來丙小腸之位小腸為壬所尅而外走也諸手經短而足經長兼以五行相尅論之俱是足經此火投於水大寒之證宜温之則愈其與難經一證寒熱相反亦名曰小腸㵼亦作洩海藏云此雜病火投於水變為寒證又外傷足太陽膀胱經左脈俱浮為表陽之候也忽變為内寒亦旺火投盛水而屈丙就壬化脈反不浮而微沈此内病與外病俱有此火投水例非精於脈診者孰能知之薑附赤石脂朱砂丹生附子半兩生乾薑半兩不炮朱砂一兩另研赤石脂一兩半水飛右為細末酒糊丸如黑豆大每服十五丸至二三十丸米湯飲下茯苓煎湯下尤妙東垣云因㸔盧氏醫鏡見此一藥味數分兩同惟丹砂用伏火者及治病有差所治者小便數而不禁怔忡多忘魘夢不已不同耳見其不同審而詳之乃得此之治法不差且泛舉之經言腎主大小便肝主小便淋溲難經云小腸為赤腸是面赤色及便溺赤色者皆出心與小腸南方赤色顯於外也經言下焦如瀆者正謂大小便也大便為隂為有形乃下焦之下者也腎藏病為腎主大便不言大腸者明子行父之道小便為氣所化乃下之高者也謂肝主小便淋溲亦是子行父道為府病諸氣化者皆府諸有形血化者皆藏病所主此府言膀胱病二證俱在下焦則同染有形無形及在府在藏有殊俱是丹田衰敗不言及心火者以其相火化行君之令故也細分之則膀胱壬水勝丙小腸者是不傳入隂故洩血洩血利不禁為有形質病且不傳隂則隂不病何為有形病此為隂之體也為府之用也天地隂陽互為體用以斯可見是明五藏者為六府所用六府者為五藏所用明矣是有形皆為傳隂也夫小便不禁是膀胱不約為遺溺此不傳隂也是丹田胞絡受寒為壬所尅大抵諸府皆盛有形物有形病皆在府貴其所來皆在藏也用伏火丹砂者去其寒性耳治法同者以其俱在下焦補諸形火同在胞絡耳以其胞與腎相對有渠相通故也腎主大便肝主小便所治安得不殊經曰腎肝同歸一治經又云少陽主骨所生病膀胱却主筋所生病亦可知也小便不禁茯苓湯下大便有病米飲湯送下凡藏府之秘不可一例治有虚秘有實秘實秘者能飲食小便赤麻仁丸七宣丸之類主之胃虚而秘者不能飲食小便清厚朴湯主之厚朴生薑製三兩白术五兩枳實麩皮炒一兩陳皮三兩甘草灸三兩半夏麯三兩右為麄末每服五錢水一盞半生薑五片棗三枚煎至一盞空心服實秘者物也虚秘者氣也脈中少有力浮則似止胸中元氣不及也加人參五味子麥門冬益智仁沈香丁香川芎白豆蔲氣血弱者不可服枳殻以損其氣也氣血盛者不可服丁香以盛其益氣也脈弦而虚不可損氣脈大而實不可益氣氣虚則生脈散氣實則三才元地之濕氣感則害人皮肉筋脈内托散主之以其外受也膏粱之變足生大丁五辛之過也七聖散主之以其内發也去桂加當歸瘡腫消者生薑自然汁調輕粉塗之諸瘡有惡肉者膏粱内入巴豆雄黄少許不傷良肉止去惡肉不惟惡瘡若癰疽有死肉不能去者白丁霜上之深則絍之淺則乾摻之以膏藥外䕶之大效大頭痛論夫大頭痛者雖為在身在上熱邪伏於已又感天地四時非節瘟疫之氣所著所以成此疾至於潰裂膿出而又染他人所以謂之疫癘也大抵足陽明邪熱太甚資實少陽相火為之熾多在少陽或在陽明甚則逆傳太陽視其腫勢在何剖分隨其經而取之濕熱為腫木盛為痛此邪發於首多在兩耳前後所先見出者為主為根治之宜早藥不宜速恐過其病上熱未除中寒已作有傷人命矣此疾是自内而之外也是為血痛况頭部受邪現見於無形之處至高之分當先緩而後急先緩者謂邪氣在上所著無形之分既著無形所傳無定若用重劑大㵼之則其邪不去反過其病矣雖用緩藥若急服之或食前或頓服咸失緩之體則藥不能騰升徐潰無形之邪或藥性味形狀擬象服餌皆湏不離緩體及寒藥或炒或酒浸之類皆是也後急者謂前緩劑已經髙分㵼邪氣入於中是到隂部入於中染於内之有形質之所若若不速去反損隂分此中治却為客熱所當急也治客以急此之謂也治主以緩先緩謂也謂陽邪在上隂邪在下各為本家病不從先後錯其緩急不惟不能解其紛而復致其亂矣此所以治主當緩治客當急謂陽分受陽邪隂分受隂邪者主也陽分受隂邪陰分受陽邪者客也凡所謂急者當急去之此治客以急也假令少陽陽明之為病少陽者謂邪出於耳前後也陽明者首靣大腫也先以黄芩黄連甘草通炒剉煎少少不住服呷之或一劑畢再用大黄或酒浸或煨又以䑕粘子新瓦上炒㕮咀煎成去柤納芒硝各等分亦時時􅀈之當食後用徐得微利幷邪氣已只服前藥如不已再服後藥依前次第用之取利己却止如陽明行經加升麻葛根芍藥之類選而加之太陽行經加𦍑活荆芥防風之類選而加之並與上藥相合用之不可獨用散者散也此一節亦見病機氣宜治洪長伏三脉風癎驚癎發狂惡人與火者灸第三顀第九顀服本方妙香丸以鍼投眼子透冷水内浸少時服之如本方法治弦細緩三脉諸癎似狂李和南五生丸大凡治雜病先調其氣次療諸疾無損胃氣是其要也若血受病亦先調氣謂氣不調則血不行又氣為之綱夫也夫不唱婦不隨也如婦人病經先柴胡以行經之表次四物以行經之裏亦先氣而後血也不能飲而渴不能食而小便黄或澁皆因胃氣虚而生熱有形之物不入火炎上而陽戊勍癸而化所以小便黄赤如棗汁法當補胃以錢仲陽白术散乾葛木香藿香等藥治之上焦渴小便自利白虎湯中焦渴大小便不利調胃承氣湯下焦渴小便赤澁大便不利大承氣湯有六經發渇各隨經藥表熱惡熱而渴者白虎湯皮膚如火燎而以手重取之不甚熱者肺熱也或目白睛赤煩燥引飲单黄芩一物兩脇肌熱脉浮弦者柴胡飲子一身熱或日晡潮熱皆血熱也四順飲子夜則行隂若發熱者血熱也四順飲桃仁湯選而用之當視其有表入裏腹痛血刺腹痛中無轉失氣之類晝則明了夜則譫語熱入血室無犯胃氣及上三焦不治自愈若甚則四順引子桃仁承氣湯證相似當下者用之寅申發熱兩脇不盛亦為柴胡證表裏内外俱熱者大柴胡湯晝則行陽氣也柴胡夜則行陰血也四順治項後側少陽經中疙疸不變肉色不問大小及月日深逺或有赤硬腫痛生山藥一䘰去皮萆麻子二箇去殻右二味研勻攤帛上貼之如聖兩手大熱為骨厥如在火中可灸湧泉三壯五壯立愈治膁刃及脚膝生瘡局方虚損門黄茋丸服之則愈定癰疽死之地分一伏兎二腓腨三背四五蔵俞五項上六腦七髭八鬢九頥問三焦有幾血海異同手少陽三焦之經起於小指次指之外側出其端終於目銳眥足少陽膽之經起於目鋭眥終足大指三毛頭至心為上焦心至臍為中焦臍至足為下焦此又足太陽之别也又靈樞云臍下膀胱至足為足三焦右手尺脉為命門包絡同胗此包絡亦有三焦之稱為命門之火遊行於五藏之間主持於内也手三焦主持上也足三焦主持下也上中下三焦通為一氣衛於身也為外護既以頭至心心至臍臍至足為狀也呼為三焦有名也以為無狀可乎經云三焦者水穀之道路也却是有形狀何以然上焦者主内而不出中焦者主腐熟水穀下焦者主出而不納故經曰上焦如霧中焦如漚下焦如瀆也手經者主持上也足經者主持下也命門者主持中也為衛者䕶持外也三焦元氣為父母之氣散也包絡相從母也並行而不相離母之元氣也故俱㑹於胸中經云膻中之分父母居之氣之海也如天地之尊不係五形清邪中於上焦名曰潔也頭痛項强腰脊痛濁邪中於下焦名曰渾也陰氣為慄便溺妄出表虛裏急上焦下焦與中焦相混怫鬰藏氣相薰中焦不治胃氣上衝榮衛不通血凝不流若衛氣前通者小便赤黄與熱相搏因熱作使游於經絡出入藏府隂氣相通陽氣後微隂無所使客氣内入嚏而出之聲嗢音互咽塞寒厥熱壅必然下血陰陽俱厥脾弱液下下焦不闔清便下重便數而難臍築湫痛命將難全此命門之脉診在右手尺也經曰五臟不和五液不下當闔不闔便溺俱脱生氣絶矣所以腹臍湫痛也故曰命將難全前三集自外而入後三焦自内而出霧不散而為喘滿此出而不内也漚不利而為留飲留飲不散又為中滿上不能内下不能出也瀆不利而為腫滿此因上内而下不出也此三焦之所不歸也三焦有藏而無府在内則游行是在血也在外則固護是在氣也上焦如霧者氣也下焦如瀆者血也中焦者氣血分之也下焦在臍下膀胱上口主分别清濁出而不内即傳道也治在臍下名曰三焦其府在氣衝中又云有藏無府成氏曰血室者血之所居也榮衛停止之所經脉流㑹之所衝脉是矣衝者竒經之一也起於腎下出於氣衝並足陽明經夾臍上行至胸中而散為諸經之㑹啓元子云衝為血海諸經朝㑹男子則運而行之女子則停而止之皆謂之血室内經曰任脉通衝脉盛男既運行女既停止故運行者無積而不滿動停止者有積而能静也不滿者陽也氣也能滿者陰也血也故滿者以時而溢為之信有期也溢動也乾道成男坤道成女故運行者陽之象也停止者陰之象也氣血榮衛男女皆有内外諧和其脉同胗脉者血之府也故為氣血之先室為藏物之舍亦為府也三焦之府在氣衝中為男女血海之府經又曰有藏而無府從無形而言之有藏有府從有形而言之也清邪濁邪所傷三焦齊病亦同兩感經云心包絡主之脉出胸中下膈厯絡三焦此其所以相與相火並行與命門之脉同胗於右尺中也陳氏五運六氣後有君火二論即陳蓬運氣圖也許先生論闗中梁寛甫証右脇肺部也咳而唾血舉動喘促者肺胗也發熱脉數不能食者火來刑金肺與脾俱虚也肺脾虚而火乘之其病為逆如此者例不可補㵼盖補金則慮金與火持而喘咳益增㵼火則慮火不退位而痃癖反盛正宜補中益氣湯也先扶元氣少少以治病藥和之聞已用藥而不獲効意必病勢苦逆而藥力未到也當與寛甫熟論逺期秋凉庶就使平復盖肺病惡春夏火氣至秋冬則退也正宜於益氣湯中隨四時陰陽升降浮沉温凉寒熱升降沉沉則順之寒熱温凉則反之順其理和其氣為治之大方也及見有證增損服之或覺氣壅間服加减枳术丸或有服間服加减枳术湯數月後庻逆氣稍回逆氣回則治法可施但恐已至色青色赤脉弦脉洪則無反矣近世論醫有主河間劉氏者有主易州張氏者盖張氏用藥依准四時陰陽升䧏而增損之正内經四氣調神之義醫而不知此是妄行也劉氏用藥務在推陳致新不使少有怫鬰正造化新新不停之義醫而不知此是無術也然而主張氏者或未盡張氏之妙則瞑眩之藥終莫敢投至失機後時而不救者多矣主劉氏者未悉劉氏之蘊則刼効目前隂損正氣遺禍于後日者多矣能用二家之長而無二家之弊則治法其庻幾乎論史副使病證史副使病不見色脉不能解料然以既愈復發言之則亦恐宜取張氏依凖四時陰陽升䧏用藥以扶元氣庶他日既愈而遂愈也寛甫病候初感必深所傷物恐當時消𨗳不盡停滯淹延變生他證以至於今恐亦宜倣劉氏推陳致新之意少加消𨗳藥於益氣湯中庶有漸緩之期也圓明膏太醫王教授傳槐英半斤河水四升浸二宿熬槐英取汁二升黄連四兩川芎防風各一兩當歸秦皮各二兩已上五味剉如菉豆大用河水六升浸一宿熬取汁三升將槐英祖再用水四升熬取二升通前共五升相合銅鍋内用木炭文武火熬入去䗶净蜜四斤净蜜法取蜜四升入鍋内微熬勿令滚其䗶沫盡浮在靣上急取下以紙覆蜜靣候冷取紙䗶自随紙去再温蜜熱以綿濾入藥汁内同煎一時許入下項飛石一十三兩金星石銀星石代赭石菩薩石寒水石紫石英雲母石并白礬少許同搗細滑石井泉石𤣥精石各二兩另研紙如末黄丹三兩研令極細已上一十一味相合再研水飛焙乾共得一十三兩研開入藥汁内又熬一時入後淬􅀈甘石二兩淬去􅀈甘石不以多少用木炭火煆紅童子小便蘸再煆紅再淬七次以碎為度再研水飛㥉乾净秤二兩入藥汁内又熬一時入下項藥銅緑半兩研青塩半兩研雄猪膽七枚取汁白丁香一合水浸研取淸汁鷹條二錢如上取汁用已上藥同熬萬轉成膏凡熬時用槐桞枝不住手攪勿令塵入鍋中湏於净室内熬膏盛入磁器中候冷入下項細末藥不可熱熱則藥力去矣乳香沒藥輕粉蕤仁去皮各半兩用朱砂牛黄腦子血竭各一錢杏仁去皮半兩南鵬砂一錢右件各别令極細珍珠珊瑚紫貝碙砂石獬白礬緑礬朴硝各一錢盆硝半錢右用預留元熟清藥汁同研極細爛攪入藥中令勻如常法㸃之神効此事難知巻二
