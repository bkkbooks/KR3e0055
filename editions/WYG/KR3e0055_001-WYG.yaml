body:
  text: 此事難知卷一元王好古撰醫之可法自伏羲神農黄帝而下名醫雖多所可學者有幾人哉至於華氏之剖腹王氏之炙鍼術非不神也後人安得而傚之非岐伯之聖經雷公之炮炙伊贄之湯液箕子之洪範越人之問難仲景之傷寒叔和之脈訣士安之甲乙啓𤣥子之傳註錢仲陽之論議皆其活法所可學者豈千方萬論印定後人眼目者所能比哉其間德高行逺竒才異士與夫居縉紳隱草莽者然有一法一節之可觀非百代可行之活法皆所不取也豈予好辯哉欲使學者觀此數聖賢而知所可慕而已或有人焉徒能廣覽泛渉自以為多學而用之無益者豈其知本或問手足太陽手足陽明手足少陽俱會於首故曰六陽會於首者亦有隂乎答曰有六府者六陽也五藏者五隂也肺開竅於鼻心開竅於舌脾開竅於口肝開竅於目腎開竅於耳是五隂也又有厥隂與督脈㑹於巔是六隂也耳者腎也復能聽聲聲為金是耳中有肺也鼻者肺也復能聞臭是鼻中有心也舌者心也復能知味是舌中有脾也目有五輪通貫五藏口為脾脾為坤土主靜而不動故無所兼言耳鼻舌各兼一目兼四此與督脈共計十三隂也腦為諸體之會即海也腎主之是為十四隂矣經脈終始寅手太隂肺始於中焦終於次指内廉出其端卯手陽明大腸始於大指次指之端終於上俠鼻孔辰足陽明胃始於鼻交頞中終於入大指間出其端已足太隂脾始於大指之端終於注心中午手少陽心始於心中終於循小指之内出其端未手太陽小腸止於小指之端終於抵鼻至目内眥斜絡於觀申足太陽膀胱始於目内眥終於小指肉側出其端酉足少隂腎始於小指之下終於注胸中戍手厥隂心包始於胸中終於循小指次指出其端亥手少陽三焦始於小指次指之端終於至目兌眥子足少陽膽始於目兌眥終於小指次指循大指内出其端貫爪甲出三毛丑足厥隂肝始於大指聚毛之上終於注肺中手之三陽從手走頭足之三陽從頭走足是高能接下也足之三隂從足走腹手之三隂從腹走手是下能趍上也故上下升降而為和易曰天道下濟而光明地道卑而上行易曰山澤通氣故氣寄於辛用於寅平旦始從中焦注循天之紀左旋至丑而終晝夜通行五十度周流八百一十丈夫唱則婦隨血隨氣而上行殊不見潤下之意經云氣主煦之升也血主濡之潤也書云水曰潤下如何説得從氣之血有下行之體如百川右行東至於海請示日用復臨泰壯夬乾姤遁否觀剥坤二六青白正分開與闢赤黑往來通道路泰即居艮否居坤乾作天門巽地户氣終於丑始於寅血諦辛隂從下去丙潛壬内却從高順至乙穴還上注婦隨夫唱幾曾停萬𣲖千流無暫住血氣包含六子中晝夜行流五十度食時骸理敬修行𤣥府身周匀閉拒排山倒海毒非常撩鼻撚髭心不怖天長地久太虚持不虧八一元來數休説乘虚謾履空嬴取康寜三六足知之非難行之難造次顛沛宜常慮人肖天地且天地之形如卵横卧於東南西北者自然之勢也血氣運行故始於手太隂終於足厥隂帝曰地之為下否乎岐伯曰地為人之下太虚之中也曰馮乎曰大氣舉之也是地如卵黄在其中矣又曰地者所以載生成之形類也易曰坤厚載物德合無疆信乎天之包地形如卵焉故人首之上為天之天足之下為地之天人之浮於地之上如地之浮於太虚之中也地之西始於寅終於丑血之東根於辛納於乙相隨往來不息獨缺於乾巽為天地之門户也啓𤣥子云戊土屬乾巳土屬巽遁甲曰六戊為天門六巳為地户此之謂也經云天地者萬物之上下左右者隂陽之道路氣血者父母也父母者天地也血氣周流於十二經總包六子於其中六氣五行是也無形者包有形而天總包地也天左行而西氣隨之百川並進而東血隨之問脾胃寄於坤如何是損至第三若從脾為第二從腎為第四請言脾數答曰脾雖寄於坤實用於己從上肺心從下腎肝脾中得三數也如氣寄於辛而用於寅包絡三焦寄於丑而用於申也此人之所以肖天地而生易曰乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口明經絡之數有幾答曰十二大經之别并任督之别脾之大絡脈别名曰大包是為十五絡諸經皆言之予謂胃之大絡名曰虚里貫膈絡出於左乳下其動應衣脈宗氣也是知絡有十六也問三焦有幾答曰手少陽者主三焦之氣也靈樞經云足三焦者太陽之别也並太陽之證入絡膀胱約下焦是知三焦有二也問藏府有幾答曰肝心脾肺腎兼包絡一名命門為六藏膽小腸胃大腸膀胱兼三焦為六府計之十二矣故包則為一府矣是為十三矣經曰胞移熱於膀胱則癃溺血又云胞痹者少腹膀胱按之内痛者若沃以湯注云膀胱胞内居之内外二境圖云膀胱者胞之室也以是知為十三藏府矣傷寒之源冬傷於寒春必温病盖因房室勞傷與辛苦之人腠理開泄少隂不藏腎水涸竭而得之無水則春木無以發生故為温病至長夏之時時强木長因絶水之源無以滋化故為大熱病也傷寒之源如此四氣調神論曰運冬氣則少隂不藏腎氣獨沉廣成子云無勞汝形無摇汝精金匱真言曰夫精者身之本也故藏於精者春不病温註云冬不按蹻精氣伏藏陽不妄升故春不病温又經云不妄作勞又云不知持滿又云水冰地折無擾乎陽又云無泄皮膚使氣亟奪啓𤣥子云腎水王於冬故行夏令則腎氣傷春木王而水廢故病於春也逆冬則傷腎故少氣以奉春生之令也是以春為温病夏為熱長夏為大熱病其變隨乎時而已邪之所感淺者其病輕而易治深者其病重而難治尤深者其病死而不治冬傷於寒春必温病冬傷於寒者冬行秋令也當寒而温火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病木不足也所不勝者侮之火太過也火土合德濕熱相助故為温病使民腠理開則少隂不藏惟房室勞傷辛苦之人得之若此者皆為温病所以不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少隂不藏房室勞傷辛苦之人陽氣泄於外腎水虧於内當春之月時强木長無以滋生化之源故為温病耳故君子周密於冬少隂得藏於内腠理以閉拒之雖有大風苛毒莫之能害矣何温病之有哉人肖天地而生也冬時陽氣俱伏於九泉之下人之陽氣俱藏於一腎之中人能不擾乎腎則六陽安靜於内内既得以安外無自而入矣此傷寒之源非天之傷人乃人自傷也傷於寒者皆為病熱為傷寒氣乃熱病之總稱故曰傷寒知寒受邪明矣六隂用事於冬陽氣在内周密閉藏可矣反勞動之而泄於外時熱已傷於水矣至春之時木當發生陽已外泄孰為鼓舞腎水内竭孰為滋飬此两者同為生化之源源既已絶木何頼以生乎身之所存者獨有熱也時强木長故為温病矣春傷於風夏生飱泄木在時為春在人為肝在天為風風者無形之清氣也當春之時發為温令反為寒折是三春之月行三冬之令也以是知水為太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虚明矣故經云從後來者為虚邪木氣既虚火令不及是所生者受病也故所不勝者侮之是以土來木之分變而為飱泄也故經云清氣在下則生飱泄以其濕令當權故飱泄之候發之於夏也若當春之時木不發生温令未顯止行冬令是謂傷衛以其陽氣不出地之外也當以麻黄湯發之麻黄味苦味之薄者乃隂中之陽也故從水中補木而㵼水發出津液為汗也若春木已生温令已顯陽氣出於地之上寒再至而復折之當以輕發之謂已得少陽之氣不必用麻黄也春傷於風夏生飱泄所以病發於夏者以其木絶於夏而土王於長夏濕本有夏行之體故飱泄於夏也不病於春者以其春時風雖有傷木實當權故飱泄不病於木之時而發於濕之分也經曰至而不至是為不及所勝妄行所不勝者薄之所生者受病此之謂也夏傷於暑秋必痎瘧暑者季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽王也所生者受病則肺金不足所不勝者侮之故水得以乘之土分土者坤也坤土申之分申為相火水入於土則水火相干水火相干則隂陽交爭故為寒熱兼木氣終見三焦是二少陽相合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧久而不愈瘧不發於夏而發於秋者以濕熱在酉之分方得其權故發於大暑已後也秋傷於濕冬生咳𠻳秋者清肅之氣收斂下行之體也為濕所傷是長夏之氣不與秋令也秋令不及所勝妄行故火得以炎上而尅金心火既形於肺故肺氣逆而為欬所不勝者侮之木氣上行與火同得動而不息也所生者受病故腎水虧也長夏已亢三焦之氣盛也命門有三焦之舍也故廹腎水上行與脾土濕熱相合為痰因痎而動於脾之濕也是以咳𠻳有聲有痰咳𠻳不發於秋而發於冬者以其六隂之極肅殺始得其氣故肺不咳𠻳於秋而咳𠻳於冬也咳𠻳者氣逆行上也氣上行而逆故面目發微腫極則身體皆腫變為水氣故曰濁氣在上則生䐜脹又曰諸氣膹鬱皆屬肺金此之謂也春傷於風夏傷於暑冬傷於寒辭理皆順時字傷令字也獨秋傷於濕作令字傷時字讀者不疑也此四者皆無所亢而害其所乘之子也邪從後至言歲之主氣各差其分而為病一定之法也若説秋字傷濕字其文與上三句相通其理與法不相通大抵理與法通不必拘於文也故説詩者不以文害辭不以辭害意以意逆志為得之矣故曰春傷於風説作人為風所傷非也若是則止當頭痛惡風自汗何以言夏為飱泄哉今言春傷於風即是時傷令也明矣經云東方來者為嬰兒風其傷人也外在於筋内舍於肝又曰春甲乙所傷謂之肝風用此二句以較前文則辭理自通矣問两感邪從何道而入答曰經云两感者死不治一日太陽與少隂俱病頭痛發惡寒口乾煩滿而渴太陽者府也自背俞而入人之所共知少隂者藏也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水也水流濕故腎受之經曰傷於濕者下先受之同氣相求耳又云天之邪氣感則害人五藏以是知内外兩感藏府俱病欲表之則有裏欲下之則有表表裏既不能一治故死矣故云两感者不治然所禀有虚實所感有淺深虚而感之深者必死實而感之淺者猶或可治治之而不救者有矣夫未有不治而獲生者也予嘗用此間有生者十得二三故立此方以待好生君子用之觧利两感神方大羗活湯防風羗活獨活防己黄芩黄連蒼术白术甘草炙細辛去土各三錢知母生川芎地黄各一两右㕮咀毎服半两水二盞煎至一盞半去柤得清藥一大盞熱飲之不觧再服三四盞解之亦可病愈則止若有餘證並依仲景隨經法治之清氣為榮清者體之上也陽也火也離中之隂䧏午後一隂生即心之生血故曰清氣為榮濁氣為衛濁者體之下也隂也水也坎中之陽升子後一陽生即腎陽舉而使之故曰濁氣為衛地之濁不升地之清能升為陽舉而使之上也天之清不䧏天之濁能降為六隂驅而使之下也經曰地氣上為雲天氣下為雨雨出地氣雲出天氣此之謂歟其用在下膽胃膀胱大腸小腸天六府氣表其體在上其用在下其用在上两目两耳鼻口舌地五藏血裏其體在下其用在上格則吐逆九竅五藏隂極自地而升是行陽道乃東方之氣金石之變上壅是也極則陽道不行皮閉於上故令人吐逆是地之氣不能上行也逆而下䧏反行隂道故氣填塞而不入則氣口之脈大四倍於人迎此清氣反行濁道也故曰格闗則不便下竅六府陽極自天而䧏是行隂道乃西方之氣膏粱之物下泄是也極則隂道不行反閉於下故不得小便是天之氣不得下通也逆而上行反行陽道故血脈凝滯而不通則人迎之脈大四倍於氣口此濁氣反行清道也故曰關三陽氣血多少寅為少陽何以復為太陽一陽初出地之外即嫩陽也故謂之少陽二陽過卯故謂之陽明三陽已至故謂之太陽之氣升至極之分便是太陽也以此推之三陽所呼之名異非二體也以其從多少而言之耳陽氣之極舉隂於九天之上故水自天而䧏故太陽即為寒水也所以血多而氣少陽明居太陽少陽之中二陽合明故曰陽明隂陽等也所以氣血俱多少陽者初出之氣少而不能鼓舞隂氣陽伏地中尚多故為龍火為震為雷為足俱屬地之下也所以氣多血少陽極舉隂於九天之上肺為衛天之極表也所以主氣故肺受之至高者肺也故為手太隂隂於此為秋氣而復䧏重陽補下焦元氣重隂補上焦元氣辛為天之味能補地之分自上而䧏於下也苦為地之味能補天之分自下而升於上也此二者皆從其源也六陽俱極舉隂於九天之上故隂自天而䧏是隂䧏於九天之上而姤卦之隂復何以從下生盖隂之首雖從天而䧏其隂之尾已至地矣故隂從地而生所以一隂從五陽之下也凡所生者從下皆從乎地也故地為萬物之母又云非母不生從地而生者為春氣從天而䧏者為秋氣九天之上為夏九天之下為冬氣血之體以上下言之有若立輪外焉天道左旋而西中焉地道右旋而東似不相侔大抵血隨氣行夫唱婦隨是也血雖從氣其體靜而不動故氣血如磨之形上轉而之西下安而不動雖云不動自有東行之意以其上動而下靜不得不爾也天地之道如故漢守所言從乎地也自乾而之坤是以乾坤之用備矣言天道者從外而之内也言地道者從内而之外也從外之内者傷寒也從内之外者雜也辨表裏中三證假令少陽證頭痛往來寒熱脈浮弦此三證但有一者是為表也口失滋味腹中不和大小便或閉而不通或泄而不調但有一者是為裏也如無上下表裏證餘者皆虚熱也是在其中矣辨隂陽二證隂證身靜重語無聲氣難布息目晴不了了鼻中呼不出吸不入往來口與鼻中氣冷水漿不入大小便不禁面上惡寒有如刀刮陽證身動輕語有聲目中了了鼻中呼吸出入能往而能來口與鼻中氣皆然辨表傷隂陽二證身表凉知在隂經也名曰隂證身表熱知在陽經也名曰陽證辨内外傷傷風鼻中氣出麄合口不開肺氣通於天也傷食口無味涎不納鼻息氣匀脾氣通於地也外傷一身盡熱先太陽也從外而之内者先無形也内傷手足不和两脇俱熱知先少陽也從内之外者先有形也内外俱傷人迎氣口俱盛或舉按皆實大表發熱而惡寒腹不和而口液此内外两傷也凡診則必捫手心手背手心熱則内傷手背熱則外傷次以脈别之冬傷於寒者春必温病夏為熱病長夏為大熱病盖因房室勞傷與辛苦之人得之水虧無以奉春生之令故春陽氣長而為温病也夏為熱病者是火先動於未動之時水預虧於水已王之日故邪但藏而不為病也夏令炎蒸其火既王與前所動者客邪與主氣二火相接所以為熱病也長夏為大熱病者火之方與秋之分皆手經居之木之方與春之分皆足經居之所傷者皆足經不足及夏火旺客氣助於手經則不足者愈不足矣故所用之藥皆泄有餘而非足經藥何以然泄有餘則不足者補矣此傷寒本足經只言足經而不言手經也大意如此至於𫝊手經者亦有之當作别論與夫竒經之病亦在其中矣六經𫝊足𫝊手經則愈陽中之隂水太陽是也為三陽之首能廵經𫝊亦越經𫝊陽中之陽土陽明是也夫陽明為中州之土主納而不出如太陽傳至此名曰廵經傳也陽中之陽木少陽是也上傳陽明下傳太隂如太陽傳至此為越經傳也隂中之隂土太隂是也上傳太隂為順下傳厥隂為生如太陽傳至此乃表傳裏也隂中之隂木厥隂也上傳少隂為實再傳太陽為自愈也太陽六傳太陽者乃巨陽也為諸陽之首膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰廵經傳為發汗不徹利小便餘邪不盡透入於裏也太陽傳少陽膽木者名曰越經傳為元受病脉浮自汗當用麻黄而不用之故也太陽傳少隂腎水者名曰表傳裏為得病急當發汗而反下汗不發所以傳也太陽傳太隂脾土者名曰誤下傳為元受病脈緩有汗當用桂枝而反下之所致也當時腹痛四肢沉重太陽傳厥隂肝木者為三隂不至於首唯厥隂與督脈上行與太陽相接名曰廵經得度傳太陽證太陽證頭項痛腰脊强發熱惡寒無汗脈尺寸俱浮而𦂳是發於陽陽者衛也麻黄湯主之麻黄一两半去節桂枝一两去皮杏仁二十粒湯浸去皮尖甘草半两炙右剉每服五錢水一盞煎温服太陽證頭項痛腰脊强發熱惡寒自汗脈尺寸俱浮而緩者榮也桂枝湯主之桂枝去皮芍藥甘草各等分右剉每服八錢水一盞半薑棗同煎温服桂枝麻黄各半湯太陽證頭痛發熱自汗惡風脈當緩而反𦂳傷風得傷寒脈也太陽證頭痛發熱無汗惡寒脈當急而反緩傷寒得傷風脈也二證脈不同本經大青龍湯主之易老桂枝麻黄各半湯此言外之意楊氏云非明脈者不同用大青龍湯以其有厥逆筋惕肉瞤及亡陽之失也故易老改為九味羗活湯而不用桂枝麻黄也羗活湯不論有汗無汗悉宜服之但有緩急不同矣九味羗活湯藥證加減服餌緩急俱見於後桂枝二麻黄一湯太陽證發熱惡寒自汗脈緩太陽證發熱惡風無汗脈緩此易老元將麻黄一桂枝二治上二證後復改用羗活湯太陽頭痛太陽膀胱脈浮𦂳直至寸口所以頭痛者頭與寸口俱高之分也兼厥隂與督脈會於巔逆太陽之經上而不得下故壅滯為頭痛於上也左手浮弦胸中痛也沈弦背俞痛右手浮弦者亦然頭痛者木也最高之分惟風可到風則温也治以辛涼秋尅春之意故頭痛皆以風藥治之者總其體之常也然各有三隂三陽之異焉故太陽則宜川芎陽明則宜白芷少陽則宜柴胡太隂則宜蒼术少隂則宜細辛厥隂則宜吳茱萸治三陽則不可越經假令治太陽陽明不可遺太陽而只用陽明藥餘倣此用三陽經解藥後身番覆重者若煩則是有陽明也若不煩而番覆輕者知不傳三隂也不傳三隂則為解也大抵三隂之體靜重與濕相同傷寒五日後無汗謂穀消水去形亡故下之三日前謂内有水穀故汗之問桂枝湯發字發汗或云當得汗解或云當發汗更發汗幷發汗宜桂枝湯者數方是用桂枝發汗也復云無汗不得服桂枝又曰汗家不得重發汗又曰發汗過多者却用桂枝甘草湯是閉汗也一藥二用如何説得仲景發汗與本草之義相通為一答曰本草云桂味辛甘熱無毒能為百藥長通血脈止煩出汗者是調血而汗自出也仲景云藏無他病發熱自汗者此衛氣不和也又云自汗者為榮氣和榮氣和則外不諧衛氣不與榮氣相和諧也榮氣和則愈故皆用桂枝湯調和榮衛榮衛既和則汗自出矣風邪由此而解非桂枝能開腠理發出汗也以其固閉榮血衛氣自和邪無容地而出矣其實則閉汗孔也昧者不解閉汗之意凡見病者便用桂枝湯發汗若與中風自汗者合其效桴鼓因見其取效而病愈則曰此桂枝發出汗也遂不問傷寒無汗者亦與桂枝湯誤之甚矣故仲景言無汗不得服桂枝是閉汗孔也又云發汗多义手胷心心悸欲得按者用桂枝甘草湯是亦閉汗孔也又云汗家不得重發汗若桂枝湯發汗是重發汗也凡桂枝條下言發字當認作出字是汗自然出也非若麻黄能開腠理而發出汗也本草出汗二字上文有通血脈一句是非三焦衛氣皮毛中藥是為榮血中藥也如是則出汗二字當認作榮衛和自然汗出非桂開腠理而發出汗也故後人用桂治虚汗讀者當逆察其意則可矣噫神農之作於其前仲景之述於其後前聖後聖其揆一也太陽禁忌不可犯小便不利不可便利之利之是謂犯本犯本則邪氣入裏不能解此犯之輕也以是五苓散不可妄用大便不可易動動之是謂動血動血是謂犯禁此犯之尤重也下之為惡風惡寒頭痛待表證悉罷方可下之也脈浮𦂳者犯之必結胸脈浮緩者犯之必痞氣太陽證當汗不咽乾不衂不淋不渇小便自利不經發汗則當發之太陽證不當汗咽乾淋渴鼻衂小便不利已經發汗不得重發如無已上忌證雖經發汗邪氣未盡亦得重發之當汗而不汗生黄其證為風寒所傷陽氣下陷入於内而排寒水上行於經絡之間本當發汗因以徹其邪醫失汗之故生黄也脾主肌肉四肢寒濕與内熱相合而生黄也當汗而發汗過多成痓其證因發汗太過腠理開泄汗漏不止故四肢急難以屈伸不當汗而汗為畜血畜血其證燥火也當益津液為上而反汗以亡其津液其毒擾陽之極則侵隂也故燥血而畜於胸中也血證見血自愈太陽病入膀胱小便利而赤畜血證也血自下者愈也知可解戰而汗解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也若先差經必不爾矣太陽傳陽明其中或有下證陽明證反退而無兼不渴却退顯少陽證是知可解也太陽證知可解者為頭不痛項不强肢節不痛則知表易解也陽明知可解者為無發熱惡寒知裏易解也少陽證知可解者寒熱日不移時而作邪未退也若用柴胡而移其時早移之於晏晏移之於早氣移之於血血移之於氣是邪無可容之地知可解也知不可解服解藥而去沈困只頭痛目悶是知濕去而風不去則欲解也若風去而濕不去則不解何以然風則高濕則下而入裏也脈知可解不可解可解之脈浮而虚不可解之脈浮而實浮而虚者只是在表浮而實者知己在裏也汗多不解者轉屬陽明也傷寒不頭痛知邪不在經若頭痛者知邪在經也易老解利法經云有汗不得服麻黄無汗不得服桂枝若差服則其變不可勝數故立此法使不犯三陽禁忌解利神方九味羌活湯羌活治大腸肢節痛君主之藥也然非無為主也乃撥亂反正之主故大無不通小無不入闗節痛非此不治也防風治一身盡痛乃軍卒中卑下之職一聽軍令而行所使引之而至蒼术别有雄壯上行之氣能除濕下安太隂使邪氣不納傳之於足太隂脾細辛治足少隂腎苦頭痛川芎治厥隂頭痛在腦香白芷治陽明頭痛在額生地黄治少隂心熱在内黄芩治太隂肺熱在胸甘草能緩裏急調和在内已上九味雖為一方然亦不可執執中無權猶執一也當視其經絡前後左右之不同從其多少大小輕重之不一増損用之如神其效即此是口傳心授㕮咀水煎服若急汗熱服以􅅅粥投之若緩汗温服之而不用湯投之也脈浮而不觧者先急而後緩脈沈而不解者先緩而後急九味羌活湯不獨解利傷寒治雜病有神中風行經者加附子中風閉澁者加大黄中風并三氣合而成痹等證各隨十二經上下内外寒熱温涼四時六氣加減補㵼用之煉蜜作丸尤妙當汗而下之成恊熱利當各隨三陽本證表藥發之發之未解下利自愈若不愈者方可以利藥治之太陽一下有八變太陽病下之其脈促不結胷者此為欲解也脈浮者必結胷脈𦂳者必咽痛脈弦者必兩脇拘急脈細數者頭痛不止脈沈𦂳者必欲嘔脈沈滑者恊熱利脈浮滑者必下血裏𫝊表太陽病反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之至於火實痛者胃也桂枝加大黄湯主之已傳戊婦告夫也所以為裏傳表即名誤下傳也傷寒雜證誤下變有輕重或問曰傷寒雜證一體若誤下之甚者變大答曰非一體也傷寒誤下變無定體雜病誤下變有定體何以然傷寒自外而入陽也陽主動雜病自内而出隂也隂主靜動者犯之其變者無窮靜者犯之其變止痞與腹脇痛而已故變無窮者為重痞與腹脇痛者為輕也五苓散為下藥五苓散為下藥乃太陽裏之下藥也太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下之使從膀胱出也腎燥膀胱熱小便不利此藥主之小便利者不宜用然大陽病熱而渴小便雖利亦宜五苓散下之當服不服則生何證答曰當服不服則穀消水去形亡必就陽明燥火戊胃發黄故有調胃湯證此太陽入本失下也由不曽服五苓散不當服服之則生何證答曰不當服而服之是為犯本小便强利津液重亡侵陽之極則侵隂而成血證也輕則桃仁承氣湯重則抵當湯故五苓散調和隂陽者也乃太陽陽明之間故為調和之劑酒毒小便赤澁宜五苓散若熱在中焦未入太陽之本小便自利而清是津液已行若與五苓散利之是重涸腎水也不惟重涸腎水酒毒之熱亦不能去故上下不通而溺澁則為發黄也若入血室則為畜血也五苓散以㵼濕熱火土入水假令太陽證傷寒自外入標本有二説以主言之膀胱為本經絡為標以邪言之先得者為本後得者為標先受之即是本也後入於膀胱本却為標也此乃客邪之標本也治當從容之標本小腸火為本膀胱水為本寒毒之氣從標入本邪與手經相合而不至膀胱五苓散主之桂枝陽中之陽茯苓陽中之隂相引而下入於本道出邪氣手經自上之下足經丙火壬水小腸自下之上膀胱火邪之氣從下之上以内為本水中有火火為客氣當再責其本兩腎相通又在下部責在下焦下焦如瀆相火明也生地黄黄蘖主之邪從本受下焦火邪遺於小腸是熱在下焦塡塞不便自内而之外也表之裏藥桂术澤㵼猪苓茯苓為陽中之隂裏之表藥生地黄黄柏黄連為隂中之陽治酒病宜發汗若利小便炎熖不肯下行故曰火鬱則發之辛温散之是從其火體也是知利小便利濕去熱不去動大便尤為疎逺大便者有形質之物酒者無形水也從發而汗之最為之近是濕熱俱去治以辛温發其火也佐以苦寒除其濕也加減涼膈退六經熱易老法涼膈散減大黄芒硝加桔梗同為舟楫之劑浮而上之治胸膈中與六經熱以其手足少陽之氣俱下胸膈中三焦之氣同相火遊行於身之表膈與六經乃至高之分此藥浮載亦至高之劑故能於無形之中隨高而走去胸膈中及六經熱也陽明證陽明證身熱目痛鼻乾不得卧不惡風寒而自汗或惡熱脈尺寸俱長白虎湯主之石膏辛寒入肝知母苦寒入腎甘草粳米之甘居中挽二藥上下陽明證禁忌不可犯不當禁忌不當利小便若發汗利小便竭其津液則生畜血證也唯當益津液為二以其火就燥也益津液者連鬚葱白湯是也汗多亡陽下多亡隂小便重利之走氣三者雖異為言少津液則一也汗多亡陽汗者本所以助陽也若陽受隂邪寒絡無形須當發去隂邪以復陽氣所謂益陽而除風寒客氣也隂邪已去而復汗之反傷陽也經曰重陽必隂故陽氣自亡汗多亡陽此之謂也下多亡隂下者本所以助隂也若隂受陽邪熱結有形須當除去已敗壞者以致新隂此所謂益隂而除火熱邪氣也陽邪已去而復下之反亡隂也經曰重隂必陽故隂氣自亡下多亡隂此之謂也汗無太早非預早之早乃早晚之早也謂當日午以前為陽之分當發其汗午後隂之分也不當發汗故曰汗無太早汗不厭早是為善攻下無太晚非待久之晚乃當日已後為隂之分也下之謂當已前為陽之分也故曰下無太晚下不厭晩是為善守汗本亡隂以其汗多陽亦隨隂而走下本㵼陽以其下多隂亦隨陽而走故曰汗多亡陽下多亡隂也若犯發汗多畜血上焦為衂若犯利小便多畜血下焦為發狂其人如狂也白虎加桂枝湯傷寒脈尺寸俱長自汗大出身表如冰石至脈傳入於裏細而小其人動作如故此陽明傳入少隂戊合癸即夫傳婦也白虎加桂枝湯主之然脈雖細小亦當以遲疾别之此證脈疾而非遲故用此法白虎加梔子湯治老㓜及虚人傷寒五六日昏冐譫語或小便淋或澁起卧無度或煩而不得眠也並宜此藥傷暑有二白虎加人參湯動而傷暑心火大盛肺氣全虧故身脈洪大動而火勝者熱傷氣也白虎加人參湯主之辛苦人多得之不可不知也白虎加蒼术湯靜而傷暑火勝金位肺氣出表故惡寒脈沈疾靜而濕勝者身體重也白虎加蒼术湯主之安樂之人多受之不可不知也春不服白虎為㵼金也秋不服柴胡為㵼水也此言體之常梔子䜴湯煩者氣也躁者血也氣主肺血主腎故用梔子以治肺煩用香䜴以治腎燥煩躁者懊憹不得眠也少氣虚滿者加甘草若嘔噦者加生薑橘皮下後腹滿而煩者梔子厚朴枳實湯下後身熱微煩者梔子甘草乾薑湯煩躁火入於肺煩也火入於腎躁也煩躁俱在上者腎子通於肺母也髪潤如油喘而不休縂言肺絶鼻者肺之外候肺氣通於鼻鼻中氣出粗大是肺也髮者血之餘腎氣主之髪潤如油火迫腎水至高之分是水將絶也仲景以髪潤喘大為肺絶兼其腎而言之髪在高巔之上雖屬腎肺為五藏之至高故言肺絶兼腎也大抵肺腎相通肺既已絶則腎不言而知其絶矣或曰煩者心為之煩躁者心為之躁何煩為肺躁為腎耶夫心者君火也與邪熱相接上下通熱金以之而躁水以之而虧獨存者火爾故肺腎與心合而為煩燥焉此煩雖肺躁雖腎其實心火為之也若有宿食而煩躁者梔子大黄湯主之問邪入陽明為譫語妄言錯失此果陽明乎答曰足陽明者胃也豈有其言哉傷寒始自皮毛入是從肺中來肺主聲入於心則為胃即戊也戊為火化下從腎肝傷寒雜證發熱相似藥不可差傷寒表證發熱惡寒而渴與下證同但頭痛身熱目疼鼻乾不得卧白虎湯主之乃陽明經病也正陽陽明氣病脈洪大先無形也雜病裏證發熱惡熱而渴但目赤者病藏也手太陽肺不足不能管領陽氣也宜以枸杞生地黄之類主之脈洪大甚則嘔血先有形也二證相似藥不可差氣病在表誤用血藥無傷也為安血為益隂也血病在裏誤用氣藥白虎湯者非也為㵼肺而損隂也狂言譫語鄭聲辯狂言者大開目與人語語所未嘗見之事即為狂言也譫語者合目自言言所日用常見常行之事即為譫語也鄭聲者聲戰無力不相接續造字出於喉中即鄭聲也嘔吐噦胃所主各有經乎答曰胃者縂司也内有太陽陽明少陽三經之别以其氣血多少而與聲物有無之不同耳吐屬太陽有物無聲乃血病也有食入即吐食已則吐食久則吐之别嘔屬陽明有物有聲氣血俱病也仲景云嘔多雖有陽明證不可下噦屬少陽無物有聲乃氣病也以此推之則大便亦各有經耳但察其有物無聲有物有聲無物有聲則知何經也至於脾病後出餘氣以五臭分之則知何藏入中州而病也陽證發㿀有下之早而發者有失下而發者有胃熱胃爛而發者然得之雖殊大抵皆戊助手少陽心火入於手太隂肺也故紅㸃如㿀生於皮毛之間耳白虎湯㵼心湯調胃承氣湯從所當而用之更當以肺脈别也傷寒之經有幾答曰有九太陽陽明少陽太隂少隂厥隂是為六也有太陽陽明有少陽陽明有正陽陽明是為三也非九而何陽明者太陽少陽俱入於胃故曰正陽陽明也前三經者陽明自病不入於裏者謂之在經不為正陽陽明矣三陽從中治太陽陽明大承氣湯少陽陽明小承氣湯正陽陽明調胃承氣湯以汗證言之以少陽居其中謂太陽證為表當汗陽明證為裏當下少陽居其中故不從汗下和之以小柴胡湯從少陽也以下證言之陽明居其中謂太陽經血多氣少陽明經氣血俱多少陽經氣多血少若從太陽下則犯少陽從少陽下則犯太陽故止從陽明也此三陽合病謂之正陽陽明不從標本從乎中也縁陽明經太陽少陽之中此經氣血俱多故取居其中是以不從太陽少陽而從陽明也陽明自病調胃承氣湯主之三陽併病白虎湯主之是從乎中也經言胃中有燥屎五六枚何如答曰無胃為受納之司大腸為傳導之府燥屎豈有在胃中哉故經言穀消水去形亡也以是知在大腸而不在胃中明矣胃實者非有物也地道塞而不通也故使胃實是以腹如仰瓦註曰難經云胃上口為賁門胃下口為幽門幽門接小腸上口小腸下口即大腸上口也大小二腸相會為䦨門水滲泄入於膀胱柤滓入於大腸結於廣腸廣腸者地道也地道不通土壅塞也則火逆上行至胃名曰胃實所以言陽明當下者言上下陽明經不退也言胃中有燥屎五六枚者非在胃中也通言陽明也言胃是連及大腸也以其胃為足經故從下而言之也從下而言是在大腸也若胃中實有燥屎則小腸乃傳導之府非受盛之府也啓𤣥子云小腸承奉胃司受盛糟粕受已復化傳入大腸是知燥屎在大腸之下即非胃中有也如何是入隂者可下答曰陽入於隂者可下非入太隂少隂厥隂之三隂也乃入三陽也三陽者非太陽少陽陽明之三陽也乃胃與大小二腸之三陽也三陽皆為府以其受盛水穀傳導有形故曰入於隂也仲景云已入府者可下此之謂也評熱論藏字黄帝問傷寒或愈或死其死皆以六七日其愈十日已上者何岐伯對以熱雖甚不死兩感者死帝問其狀岐伯云一日太陽二日陽明三日少陽􅁇之三陽經絡皆受病而未入於藏者可汗而已此藏物之藏非五臟之臟也若三陽經入於藏物之藏是可泄也可泄一句於此不言便言四日太隂五日少隂六日厥隂於此却不言可泄但言三隂三陽五藏六府皆受病榮衛不行五臟不通則死此一節是言兩感也故下文却言兩感於寒者七日巨陽衰至十二日六經盡衰大氣皆去其病已矣是通説上文六日所受之病也以此知前文四日太隂五日少隂六日厥隂皆在經絡故十二日愈也豈可便以太隂少隂厥隂為可泄乎帝問治岐伯對以治之各通其藏脈日衰已矣是通説上文六日所受之病并十二日衰已之意盡矣終復言其未滿三日可汗而已又言其滿三日可泄而已一句只是重前文三陽受病未入於藏者可汗其滿三日已入於藏物之藏者可泄也後三隂經岐伯雖不言可汗可泄止是在經者便可汗在藏物之藏者便可下也何必穿鑿無已以前三日為三陽後三日為三隂耶若認藏字為五臟之臟則前後顛倒不通若認藏字為藏物之藏則前後辭理皆順矣故仲景曰已入於府者可下新校正云府字當作藏字太云亦素云作府何疑之有仲景太陽陽明大承氣少陽陽明小承氣正陽陽明調胃承氣是三陽已入於藏者泄之也太隂桂枝湯少隂麻黄附子細辛湯厥隂當歸四逆湯是三隂未入於藏者汗之也大小調胃三承氣湯必須脈浮頭痛惡風惡寒表證悉罷而反發熱惡熱譫言妄語不大便者則當用之凡用下藥不論大小若不渴者知不在有形也則不當下若渴者則知纒有形也纒有形是為在裏在裏則當下大承氣湯主之大黄用酒浸治不大便妙道不通行上引大黄至巔而下厚朴薑汁製治腹脇䐜脹滿芒硝治腹轉失氣内有燥屎本草云味辛以潤腎燥今人不用辛字只用鹹字鹹能耎堅與古人同意枳殻麩炒治心下痞按之良久氣散病緩此并主心下滿乃肝之氣盛也六府受有形主血隂也大黄芒硝大實燥屎浮手足陽明大腸胃沉手足太隂肺脾痞大黄枳實厚朴五藏主無形是氣陽也小承氣湯治實而微滿狀若饑人食飽飯腹中無轉失氣此大承氣只減芒硝心下痞大便或通熱甚須可下者宜用此大黄生用厚朴薑製枳殻麩炒張仲景曰雜證用此名曰三物厚朴湯調胃承氣湯治實而不滿不滿者腹狀如仰瓦腹中轉而失氣有燥屎不大便而譫語者大黄酒浸邪氣居高非酒不至譬如物在高巔人迹之所不及則射以取之故用酒只用大黄生者苦泄峻必下則遺高之分邪熱也是以愈後或目赤或喉痺或頭腫或膈上熱疾生矣甘草灸經云以甘緩之芒硝以辛潤之又曰以鹹耎之已上二法不可差也若有所差則無形者有遺假令調胃承氣證用大承氣下之則愈後元氣不復以其氣藥犯之也大承氣證用調胃承氣下之則愈後神癡不清以其氣藥無之也小承氣證若用芒硝下之則或下利不止變而成虚矣三承氣豈可差乎大柴胡湯治有表復有裏有表者脈浮或惡風或惡寒頭痛四證中或有一二尚在者乃是十三日過經不解是也有裏者譫言妄語擲手揚視此皆裏之急者也欲汗之則裏已急欲下之則表證仍在故以小柴胡中藥調和三陽是不犯諸陽之禁以芍藥下安太隂使邪氣不納以大黄去地道不通以枳實去心下痞悶或濕熱自利若裏證已急者通宜大柴胡湯小柴胡加減人參甘草加芍藥枳實大黄是也欲緩下之全用小柴胡加枳實大黄亦可少陽證少陽證胸脇痛往來寒熱而嘔或欬而耳聾脈尺寸俱弦小柴胡湯主之柴胡少陽半夏太陽黄芩陽明人參太隂甘草太隂薑棗辛甘發散右各隨仲景本條下加減用之則可矣藥如本法少陽證禁忌不可犯忌發汗忌利小便忌利大便故名三禁湯乃和解之劑若犯之則各隨上下前後本變及中變與諸變不可勝數醫者宜詳之如何是半表半裏答曰身後為太陽太陽為陽中之陽陽分也身前為陽明陽明為陽中之隂隂分也陽為在表隂為在裏即隂陽二分邪在其中矣治當不從標本從乎中治此乃治少陽之法也太陽膀胱水寒也陽明大腸金燥也邪在其中近後膀胱水則惡寒近前陽明燥則發熱故往來寒熱也此為三陽之表裏非内外之表裏也但不可認裏作當下之裏故以此藥作和解之劑非汗非下也半表半裏有幾邪在榮衛之間謂之半表裏也太陽陽明之間少陽居身之半表裏也五苓散分隂陽膀胱經之半表裏也理中湯治㵼吐上下之半表裏也問婦人經病大人小兒内熱潮作并瘧疾寒熱其治同否答曰帝問病之中外者何岐伯對曰從内之外者調其内若盛於外者先治内而後治外從外之内者治其外若盛於内者先治外而後治内此言表裏所出之異也又云中外不相及則治主病者中外不相及者半表半裏也自外入者有之自内出者亦有之外入内出雖異邪在半表半裏則一也此中外不相及為少陽也治主病者治少陽也帝問寒熱之病惡寒發熱如瘧或發一日或發間日岐伯對以勝復之氣會遇之時有多有少隂多陽少其發日逺陽多隂少其發日近此勝復相薄盛衰之節瘧亦同法瘧者少陽也少陽者東方之氣也逆行則發寒順行則發熱故分之氣異往來之不定也婦人經水適斷病作少陽治之傷寒雜病一體經云身有病而有邪脈經閉也又云月事不來者胞脈閉也經閉者尺中不至胞閉者生化絶源二者皆血病也厥隂主之厥隂病則少陽病矣累及其夫也小兒外感内傷若有潮作寒熱等證並同少陽治之男女同候已上男子婦人小兒閨女或實作大熱或變成勞脈有浮中沈之不同故藥有表裏和之不一察其在氣在血定其行隂行陽使大小不失其宜輕重各得其所逆從緩急舉無不當則可以萬全矣此少陽一治不可不知也熱有虚實外何以别答曰五臓隂也所主皆有形骨肉筋血皮毛是也此五藏皆隂足是為實熱隂足而熱不能起理也隂足而熱反勝之是為實熱若骨痿肉爍筋緩血枯皮聚毛落五隂不足而為熱病是虚熱少陽雜病婦人先病惡寒手足冷全不發熱脈八至兩脇微痛治者便作少陽治之或曰是則然矣論猶未也至如無寒熱無脇痛當作何經治或者不敢對惡寒為太陽脈八至且作陽治當不從標本從乎中也治此者少陽也若曰脈八至作相火亦少陽也兼又從内而之外也是又當先少陽也此不必論兩脇痛與不痛脈弦與不弦便當作少陽治之陽盛隂虚發寒者何答曰為陽在内侵於骨髓隂在外致使發寒治當不從内外從乎中治也宜小柴胡湯調之倍加薑棗平旦潮熱熱在行陽之分肺氣主之故用白虎湯以㵼氣中之火日晡潮熱熱在行隂之分腎氣主之故用地骨皮飲以㵼血中之火白虎湯其脈洪故抑之使秋氣得以下降也地骨皮飲其脈弦故舉之使春氣得以上升也地骨皮㵼腎火總治熱在外地為隂骨為裏皮為表牡丹皮治胞中火無汗而骨蒸牝牡乃天地之稱也牡為羣花之首葉為陽發生也花為隂成實也丹者赤也火也能㵼隂中之火四物湯加上二味治婦人骨蒸知母㵼腎火有汗而骨蒸太隂證腹滿咽乾手足自溫自利不渇時腹痛脈尺寸俱沈細太隂可汗太隂脈浮者可汗宜桂枝湯太隂可溫自利不渇者屬太隂以其藏有寒故也當溫之宜四逆輩此條雖不言脈當知沈遲而弱仲景理中湯丸暨易老人參黄耆湯量其輕重或温或熱人之强弱虚實所可宜者選而用之太隂有可下者乎答曰有經云本太陽湯醫反下之因爾腹滿時痛者太隂也桂枝芍藥湯主之大實痛者桂枝加大黄湯易老云此非本有是證以其錯下脾傳於胃故誤下傳知可觧太隂中風四肢煩疼陽微隂澁而長者欲愈表少裏和脈長者為陽漸生也此一證太隂便從外感太隂病欲觧時從亥至丑上也太隂證禁忌不可犯太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之則胸下結鞭太隂為病脈弱其人續自便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也傷寒而脈浮緩手足自温者繫在太隂小便自利者則不發黄日乆利益甚必自止者便硬乃入府傳陽明也腹痛部分中脘痛太隂也理中建中黄耆湯類主之臍腹痛少隂也四逆真武附子湯類主之少腹痛小腹痛厥隂也重則正陽囘陽丹之類輕則當歸四逆湯太隂傳少隂痛甚者當變下利不止雜證而痛四物苦練湯酒煮當歸丸増損當歸丸之類夏肌熱惡熱脈洪疾手太隂足陽明主之黄芩芍藥湯秋肌熱惡寒脈沈疾手少隂足太隂主之桂枝芍藥湯腹痛腹痛者芍藥甘草湯主之腹不滿者加棗若滿者不加脾虚滿者黄茋湯芍藥停濕中滿者分食甘二藥用甘引至滿所脾實平胃散蒼术泄濕小便不利者利之大便秘實痞厚朴枳實大便利虚痞芍藥陳皮傷食滿者傷厥隂是以腹脹滿者皆屬木少隂證少隂證口燥舌乾而渴脈尺寸俱沈疾則大承氣湯沈遲則四逆湯少隂邪入於裏上接於心與火俱化而尅金惡候或見氣死入胃脈沈細而疾疾則大承氣下之下於本與水俱化而為寒厥逆或見身冷靜重脈沈細而遲遲則四逆湯温之疾雖可下若疾而無力者亦不可下為陽將盡也少隂證口燥舌乾而渇身表凉脈沈細而虚㵼心湯主之此有形無形之藥也傷寒外證全在下證大熱而脈反細小不可下㵼心湯主之少隂受病身熱無汗體沈或體輕脈沈有頭痛不厥麻黄附子㵼心湯主之走無形證其人病身熱而煩燥不寜大小便自利其脈浮洪而無實力按之全無者附子㵼心湯主之走有形證其人病上吐下㵼不止當渇而反不渇其脈微細而弱理中湯主之渇而脈沈有力而疾者五苓散主之少隂證發熱脈沈者必當汗緩汗之麻黄附子細辛湯微汗之麻黄附子甘草湯少隂證下利辨色青者當下色不青者當温少隂證口中辨口中和者當温口乾燥者當下少隂證咽喉辨熱者甘草湯寒者半夏湯寒熱者桔梗湯通脈四逆湯薑附加甘草為脈沈細而遲弦薑附以治寒甘以緩之為汗苦急也其證小便自利子能令母實自東之北為逆行也薑附加葱白為脈沈細而遲濇薑附以治寒卒以潤之為腎惡燥也其證大便自利令主氣自北而西此亦以為逆行也少隂禁忌不可犯脈細沈數病為在裏不可發汗脈微者不可發汗尺脈微弱澁者復不可下麻黄附子細辛湯體沈加防已蒼术乃勝濕也體輕加石膏知母乃勝熱也此事難知巻一
