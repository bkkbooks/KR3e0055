body:
  text: 此事難知醫家類提要臣等謹案此事難知二卷元王好古撰好古字海藏趙州人李杲之髙弟也是編専述杲之緒論於傷寒證治尤詳其問三焦有幾分别手足明孫一奎極稱其功但謂命門包絡於右尺同診又謂包絡亦有三焦之稱未免誤會經㫖史稱杲長於傷寒而會要一書元好問實序之今其書已失傳則杲之議論猶賴此以存其一二前有至大元年自序稱得師不傳之祕旬儲月積寖就篇帙蓋好古所自為裒輯者今本東垣十書竟屬之杲則非矣乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀此事難知原序豫讀醫書幾十載矣所仰慕者仲景一書為尤焉然讀之未易洞逹其趣欲得一師指之遍國中無有能知者寤而思寐而思天其勤恤俾我李公明之授手及所不傳之妙旬儲月積浸就編帙一語一言美無可狀始而終之終而始之即無端之圜璧也或有人焉厭聞而惡見者豈公徒使之然哉彼未嘗聞未嘗見恥夫後於人之過也因目之曰此事類難知以其不因師指也人徒見是書為傷寒之法而不知上合軒岐之經中契越人之典下符叔和之文茲又言外不傳之祕具載斯文矣時至大改元秋七月二十有一日古趙王好古撰
